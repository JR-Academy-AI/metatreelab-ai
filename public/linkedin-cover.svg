<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1128" height="191" fill="#000000"/>

  <defs>
    <linearGradient id="lcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
    <radialGradient id="lcGlow" cx="78%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#00B4D8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="lcDots" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Dot grid background -->
  <rect width="1128" height="191" fill="url(#lcDots)"/>
  <!-- Radial glow right side -->
  <rect width="1128" height="191" fill="url(#lcGlow)"/>

  <!-- Top hairline accent -->
  <rect x="0" y="0" width="1128" height="1.5" fill="url(#lcGrad)" opacity="0.7"/>

  <!-- Top eyebrow strip (mono section label style) -->
  <text x="220" y="34" fill="#ffffff" fill-opacity="0.45" font-family="ui-monospace, 'SF Mono', 'Space Mono', monospace" font-size="11" font-weight="500" letter-spacing="2.4">
    / AI · BUILD &#160;&#160;·&#160;&#160; ADOPT &#160;&#160;·&#160;&#160; DIGITAL EMPLOYEE &#160;&#160;·&#160;&#160; PROPERTY
  </text>

  <!-- M Logo (left side, vertically centered, avoiding bottom-left logo overlap zone) -->
  <g transform="translate(72, 76)">
    <g transform="scale(1.7) translate(-16, -16)">
      <path
        d="M5 25V7L16 17L27 7V25"
        stroke="url(#lcGrad)"
        stroke-width="3.6"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"
      />
      <circle cx="5" cy="7" r="2.6" fill="url(#lcGrad)"/>
      <circle cx="27" cy="7" r="2.6" fill="url(#lcGrad)"/>
      <circle cx="16" cy="17" r="2.6" fill="url(#lcGrad)"/>
    </g>
  </g>

  <!-- Wordmark + tagline block -->
  <text x="146" y="96" fill="#ffffff" font-family="ui-sans-serif, 'DM Sans', system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" letter-spacing="2">
    METATREE AI LAB
  </text>

  <text x="146" y="128" fill="#ffffff" fill-opacity="0.7" font-family="ui-sans-serif, 'DM Sans', system-ui, sans-serif" font-size="16" font-weight="400" letter-spacing="0.2">
    AI agents, memory systems &amp; marketing pipelines —
  </text>
  <text x="146" y="150" fill="#ffffff" fill-opacity="0.7" font-family="ui-sans-serif, 'DM Sans', system-ui, sans-serif" font-size="16" font-weight="400" letter-spacing="0.2">
    built on the same architecture we ship JR Academy on.
  </text>

  <!-- Right-side neural cluster (3-2-1 nodes connected) -->
  <g transform="translate(880, 100)" opacity="0.85">
    <!-- connecting lines -->
    <line x1="0"   y1="-32" x2="50" y2="-12" stroke="url(#lcGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="0"   y1="0"   x2="50" y2="-12" stroke="url(#lcGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="0"   y1="32"  x2="50" y2="12"  stroke="url(#lcGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="0"   y1="-32" x2="50" y2="12"  stroke="url(#lcGrad)" stroke-width="1" opacity="0.35"/>
    <line x1="0"   y1="0"   x2="50" y2="12"  stroke="url(#lcGrad)" stroke-width="1" opacity="0.35"/>
    <line x1="0"   y1="32"  x2="50" y2="-12" stroke="url(#lcGrad)" stroke-width="1" opacity="0.35"/>
    <line x1="50"  y1="-12" x2="100" y2="0"  stroke="url(#lcGrad)" stroke-width="1" opacity="0.55"/>
    <line x1="50"  y1="12"  x2="100" y2="0"  stroke="url(#lcGrad)" stroke-width="1" opacity="0.55"/>
    <!-- layer 1 (3 nodes) -->
    <circle cx="0" cy="-32" r="4" fill="url(#lcGrad)"/>
    <circle cx="0" cy="0"   r="4" fill="url(#lcGrad)"/>
    <circle cx="0" cy="32"  r="4" fill="url(#lcGrad)"/>
    <!-- layer 2 (2 nodes) -->
    <circle cx="50" cy="-12" r="4" fill="url(#lcGrad)"/>
    <circle cx="50" cy="12"  r="4" fill="url(#lcGrad)"/>
    <!-- layer 3 (1 node, brain pulse) -->
    <circle cx="100" cy="0" r="9" fill="url(#lcGrad)" opacity="0.25"/>
    <circle cx="100" cy="0" r="5" fill="url(#lcGrad)"/>
  </g>

  <!-- URL bottom-right -->
  <text x="1056" y="170" text-anchor="end" fill="#7df9c5" font-family="ui-monospace, 'SF Mono', 'Space Mono', monospace" font-size="13" font-weight="500" letter-spacing="2">
    metatreelab.ai
  </text>
</svg>
